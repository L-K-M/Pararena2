# CD: package self-contained builds for every supported target.
#
# - every push to master (and manual runs) uploads the packages as workflow
#   artifacts — a rolling "does it still ship?" check
# - pushing a tag like v1.0 additionally publishes a GitHub Release with the
#   packages attached
#
# SDL3 is linked statically (it dlopens X11/Wayland/audio at runtime, so the
# Linux binary stays portable across distros), and the asset pack travels
# next to the binary — each archive is a complete, runnable game.
#
# Targets not in the matrix: Linux arm64 (ubuntu-24.04-arm) and Windows arm64
# (windows-11-arm) runners are free for public repos only — add matrix
# entries mirroring the x86_64 ones if/when this repo can use them.

name: release

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: macos-universal
            os: macos-latest
            osx_archs: "arm64;x86_64"
          - name: windows-x86_64
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SDL build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libasound2-dev libpulse-dev libpipewire-0.3-dev libjack-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libwayland-dev libdecor-0-dev libdrm-dev libgbm-dev \
            libgl1-mesa-dev libegl1-mesa-dev libdbus-1-dev libudev-dev \
            libibus-1.0-dev

      - name: Configure
        shell: bash
        run: |
          EXTRA=()
          if [ -n "${{ matrix.osx_archs }}" ]; then
            EXTRA+=(-DCMAKE_OSX_ARCHITECTURES="${{ matrix.osx_archs }}"
                    -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0)
          fi
          cmake -S port -B port/build \
                -DCMAKE_BUILD_TYPE=Release \
                -DSDL_SHARED=OFF -DSDL_STATIC=ON \
                "${EXTRA[@]}"

      - name: Build
        run: cmake --build port/build --config Release -j

      - name: Locate binary
        id: bin
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "path=port/build/Release/pararena2.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=port/build/pararena2" >> "$GITHUB_OUTPUT"
          fi

      - name: Smoke test (headless CPU vs CPU)
        shell: bash
        run: ./${{ steps.bin.outputs.path }} --headless --cpu-demo --frames 900 --fast 8

      - name: Package
        id: pack
        shell: bash
        run: |
          BIN="${{ steps.bin.outputs.path }}"
          DAT="$(dirname "$BIN")/pararena2.dat"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="$GITHUB_REF_NAME"
          else
            VERSION="${GITHUB_SHA::7}"
          fi
          NAME="pararena2-$VERSION-${{ matrix.name }}"
          mkdir -p "stage/pararena2"
          if [ "$RUNNER_OS" = "macOS" ]; then
            # Ship a double-clickable .app instead of a bare Unix binary. The binary is
            # the static universal build, so it needs no dylibs alongside; the asset pack
            # goes in Contents/Resources, which is what SDL_GetBasePath() returns for a
            # bundle, so the port's existing search resolves it. An ad-hoc signature
            # (identity "-") is what lets a universal app launch on Apple Silicon — it is
            # NOT a Developer ID signature and is not notarized, so Gatekeeper still warns
            # on first open (the release notes explain how to bypass that).
            APP="stage/pararena2/Pararena2.app"
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
            cp "$BIN" "$APP/Contents/MacOS/pararena2"
            cp "$DAT" "$APP/Contents/Resources/pararena2.dat"
            cp port/assets/icon/pararena.icns "$APP/Contents/Resources/pararena.icns"
            sed "s/__VERSION__/${VERSION#v}/g" port/macos/Info.plist > "$APP/Contents/Info.plist"
            plutil -lint "$APP/Contents/Info.plist"
            codesign --force --sign - "$APP"
            codesign --verify --strict "$APP"
          else
            cp "$BIN" "stage/pararena2/"
            cp "$DAT" "stage/pararena2/"
          fi
          cp port/README.md "stage/pararena2/README.md"
          cp LICENSE "stage/pararena2/"
          if [ "$RUNNER_OS" = "Windows" ]; then
            (cd stage && 7z a "../$NAME.zip" pararena2)
            echo "file=$NAME.zip" >> "$GITHUB_OUTPUT"
          else
            tar -czf "$NAME.tar.gz" -C stage pararena2
            echo "file=$NAME.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify macOS universal .app binary
        if: runner.os == 'macOS'
        run: |
          BIN="stage/pararena2/Pararena2.app/Contents/MacOS/pararena2"
          lipo -info "$BIN" | tee /dev/stderr | grep -q "arm64"
          lipo -info "$BIN" | grep -q "x86_64"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.pack.outputs.file }}
          path: ${{ steps.pack.outputs.file }}
          if-no-files-found: error

  android:
    name: package android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK, platform, build-tools, cmake
        run: |
          yes | sdkmanager --install \
            "platforms;android-35" "build-tools;35.0.0" \
            "ndk;28.2.13676358" "cmake;3.22.1" > /dev/null

      - name: Fetch SDL source + stage asset pack
        run: bash port/android/fetch-deps.sh

      - name: Build APK (native lib + SDL3, arm64-v8a)
        working-directory: port/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Name the APK
        id: apk
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then VERSION="$GITHUB_REF_NAME"; else VERSION="${GITHUB_SHA::7}"; fi
          SRC="port/android/app/build/outputs/apk/debug/app-debug.apk"
          OUT="pararena2-$VERSION-android-arm64.apk"
          cp "$SRC" "$OUT"
          echo "file=$OUT" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.file }}
          path: ${{ steps.apk.outputs.file }}
          if-no-files-found: error

  release:
    name: publish GitHub release
    needs: [package, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ### macOS

            The macOS download (`*-macos-universal.tar.gz`) contains **Pararena2.app**, a
            universal (Apple Silicon + Intel) bundle. It is ad-hoc signed but **not**
            notarized, so Gatekeeper warns on first launch. To open it:

            - **Right-click** (or Control-click) Pararena2.app → **Open** → **Open**, or
            - `xattr -dr com.apple.quarantine /path/to/Pararena2.app`

            Linux and Windows downloads contain a self-contained `pararena2` binary with
            its asset pack alongside — unpack and run.
